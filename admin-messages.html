<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الرسائل · Helper Pal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Cairo", sans-serif;
            background: linear-gradient(135deg, #0f1724, #1a2332);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2.5rem;
            color: #3b82f6;
            text-align: center;
            margin-bottom: 2rem;
        }
        .messages-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message-card {
            background: rgba(26, 35, 50, 0.95);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 1.5rem;
            padding: 1.5rem;
            transition: 0.3s;
        }
        .message-card:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
        }
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .sender-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .sender-info i {
            color: #3b82f6;
            font-size: 1.2rem;
        }
        .sender-name {
            font-weight: 600;
            color: #3b82f6;
        }
        .sender-phone {
            color: #94a3b8;
        }
        .message-time {
            color: #64748b;
            font-size: 0.9rem;
        }
        .message-content {
            background: rgba(15, 23, 36, 0.5);
            padding: 1rem;
            border-radius: 1rem;
            margin-top: 0.5rem;
            color: #e2e8f0;
            line-height: 1.7;
        }
        .no-messages {
            text-align: center;
            padding: 3rem;
            background: rgba(26, 35, 50, 0.5);
            border-radius: 2rem;
            border: 2px dashed rgba(59, 130, 246, 0.3);
        }
        .no-messages i {
            font-size: 4rem;
            color: #3b82f6;
            margin-bottom: 1rem;
        }
        .back-home {
            display: inline-block;
            margin-top: 2rem;
            color: #3b82f6;
            text-decoration: none;
            border: 2px solid #3b82f6;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            transition: 0.3s;
        }
        .back-home:hover {
            background: #3b82f6;
            color: #0f1724;
            transform: translateY(-2px);
        }
        .delete-btn {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 2px solid #ef4444;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Cairo', sans-serif;
        }
        .delete-btn:hover {
            background: #ef4444;
            color: white;
        }
        .read-badge {
            background: #22c55e;
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-size: 0.8rem;
        }
        .unread-badge {
            background: #3b82f6;
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-size: 0.8rem;
        }
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .message-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-inbox"></i> رسائل الاتصال</h1>
        
        <div id="messagesContainer" class="messages-grid">
            <div class="no-messages">
                <i class="fas fa-envelope-open-text"></i>
                <h3>جاري تحميل الرسائل...</h3>
            </div>
        </div>

        <div class="text-center">
            <a href="index.html" class="back-home"><i class="fas fa-home"></i> العودة للرئيسية</a>
        </div>
    </div>

    <!-- Firebase SDK - الطريقة الصحيحة مع Module -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDv348xdxShxrVVAEtIlCpeBfKqvOfY-0o",
            authDomain: "talk-19c55.firebaseapp.com",
            databaseURL: "https://talk-19c55-default-rtdb.firebaseio.com",
            projectId: "talk-19c55",
            storageBucket: "talk-19c55.firebasestorage.app",
            messagingSenderId: "908101479029",
            appId: "1:908101479029:web:8e3fa4ffa469d4e56a663c"
        };

        // تهيئة Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // دالة تحميل الرسائل
        function loadMessages() {
            const messagesRef = ref(database, 'admin_messages');
            
            onValue(messagesRef, (snapshot) => {
                const messages = snapshot.val();
                const container = document.getElementById('messagesContainer');
                
                if (!messages) {
                    container.innerHTML = `
                        <div class="no-messages">
                            <i class="fas fa-envelope-open-text"></i>
                            <h3>لا توجد رسائل بعد</h3>
                            <p>سيظهر هنا رسائل المستخدمين</p>
                        </div>
                    `;
                    return;
                }

                // تحويل الكائن إلى مصفوفة وترتيبها من الأحدث للأقدم
                const messagesArray = Object.entries(messages).map(([id, data]) => ({
                    id,
                    ...data
                })).sort((a, b) => b.timestamp - a.timestamp);

                let html = '';

                messagesArray.forEach(msg => {
                    const date = new Date(msg.timestamp).toLocaleDateString('ar-EG', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    html += `
                        <div class="message-card">
                            <div class="message-header">
                                <div class="sender-info">
                                    <i class="fas fa-user-circle"></i>
                                    <span class="sender-name">${msg.name}</span>
                                    <span class="sender-phone"><i class="fas fa-phone"></i> ${msg.phone}</span>
                                    <span class="${msg.read ? 'read-badge' : 'unread-badge'}">
                                        ${msg.read ? 'مقروءة' : 'جديدة'}
                                    </span>
                                </div>
                                <div class="message-time">
                                    <i class="far fa-clock"></i> ${date}
                                </div>
                            </div>
                            <div class="message-content">
                                ${msg.message}
                            </div>
                            <div style="margin-top: 1rem; text-align: left;">
                                <button class="delete-btn" onclick="window.deleteMessage('${msg.id}')">
                                    <i class="fas fa-trash"></i> حذف
                                </button>
                                ${!msg.read ? `<button class="delete-btn" onclick="window.markAsRead('${msg.id}')" style="margin-left: 0.5rem; border-color: #3b82f6; color: #3b82f6;">✓ تحديد كمقروءة</button>` : ''}
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;
            });
        }

        // دالة حذف رسالة
        window.deleteMessage = function(id) {
            if (confirm('هل أنت متأكد من حذف هذه الرسالة؟')) {
                const messageRef = ref(database, 'admin_messages/' + id);
                remove(messageRef)
                    .then(() => alert('✅ تم حذف الرسالة'))
                    .catch((err) => {
                        console.error(err);
                        alert('❌ حدث خطأ في الحذف');
                    });
            }
        };

        // دالة تحديد كمقروءة
        window.markAsRead = function(id) {
            const messageRef = ref(database, 'admin_messages/' + id);
            update(messageRef, { read: true })
                .catch(err => console.error(err));
        };

        // تحميل الرسائل عند فتح الصفحة
        window.onload = loadMessages;
    </script>
</body>
</html>
